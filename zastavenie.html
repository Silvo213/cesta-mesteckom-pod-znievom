<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html"><span class="k">K</span>LÁŠTOR<small>POD ZNIEVOM</small></a>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="index.html">Chodník</a></li>
      <li><a href="index.html#zastavenia" class="active">Zastavenia</a></li>

      <li><a href="kviz.html" class="cta">Kvíz</a></li>
    </ul>
  </div>
</header>

<section class="page-head">
  <div class="wrap">
    <span class="bignum ghost-num" id="stop-bignum"></span>
    <figure class="head-sketch" aria-hidden="true"><img id="stop-sketch" src="" alt=""></figure>
    <p class="breadcrumbs"><a href="index.html">Chodník</a> / <a href="index.html#zastavenia">Zastavenia</a> / <span id="crumb-title"></span></p>
    <span class="label" id="stop-kicker"></span>
    <h1 class="display-xl" id="stop-title"></h1>
    <p class="lead intro" id="stop-short"></p>
  </div>
</section>

<div class="wrap">
  <div class="video-block">
    <div class="frame">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="video-frame" id="video-frame"></div>
    </div>
  </div>

  <div class="stop-body">
    <article class="stop-text">
      <span class="label">Príbeh miesta</span>
      <div id="stop-text"></div>
    </article>
    <aside>
      <div class="aside-block scene-block" id="scene-card" hidden>
        <h3><i></i>Postava z filmu</h3>
        <div class="character" id="scene-character"></div>
        <p id="scene-desc"></p>
      </div>
      <div class="aside-block" id="persons-card" hidden>
        <h3><i></i>Významné osobnosti</h3>
        <ul id="persons-list"></ul>
      </div>
    </aside>
  </div>

  <nav class="stop-nav" id="stop-nav"></nav>
</div>

<footer>
  <div class="wrap">
