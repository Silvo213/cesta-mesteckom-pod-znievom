  <g fill="#7d8fc7" opacity=".5"><circle cx="90" cy="110" r="2.2"/><circle cx="560" cy="150" r="2"/><circle cx="550" cy="390" r="2.2"/></g>
  <g fill="#f2b117" opacity=".5"><circle cx="480" cy="110" r="2.2"/><circle cx="60" cy="250" r="2"/></g>
