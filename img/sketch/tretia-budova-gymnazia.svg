    <path d="M210 262 v26 M240 262 v26 M270 262 v26 M300 262 v26 M380 262 v26 M410 262 v26 M440 262 v26 M470 262 v26" stroke-width="1.2"/>
    <path d="M210 310 v26 M240 310 v26 M270 310 v26 M300 310 v26 M380 310 v26 M410 310 v26 M440 310 v26 M470 310 v26" stroke-width="1.2"/>
    <!-- vchod so schodmi -->
    <path d="M322 358 L322 322 L348 322 L348 358 M314 358 h42 M310 366 h50" stroke-width="2.6"/>
