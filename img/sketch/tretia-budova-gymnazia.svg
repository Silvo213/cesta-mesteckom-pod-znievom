<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <defs>
    <filter id="rgh" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="3" seed="71" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <filter id="wc" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="33" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
      <feGaussianBlur in="d" stdDeviation="1.4"/>
    </filter>
  </defs>

  <g filter="url(#wc)">
    <ellipse cx="300" cy="75" rx="270" ry="50" fill="#b9c2e2" opacity=".32"/>
    <ellipse cx="320" cy="270" rx="220" ry="80" fill="#b9c2e2" opacity=".38"/>
    <ellipse cx="200" cy="250" rx="60" ry="90" fill="#7d8fc7" opacity=".28"/>
