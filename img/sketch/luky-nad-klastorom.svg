    <path d="M296 316 q18 -10 34 -2" stroke-width="2"/>
    <path d="M330 296 q16 6 26 18" stroke-width="2.2"/>
    <!-- plátno vo vode -->
    <path d="M352 322 q22 -6 40 4 q-16 10 -38 6" stroke-width="2"/>
