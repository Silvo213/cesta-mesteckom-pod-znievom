  <g fill="#f2b117" opacity=".5"><circle cx="520" cy="140" r="2.4"/><circle cx="70" cy="120" r="2"/></g>
  <g fill="#7d8fc7" opacity=".5"><circle cx="140" cy="110" r="2"/><circle cx="560" cy="300" r="2.4"/><circle cx="480" cy="392" r="2"/></g>
