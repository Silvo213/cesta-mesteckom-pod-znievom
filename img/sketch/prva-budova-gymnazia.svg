    <path d="M260 398 Q 300 390 340 398" stroke-width="2" stroke-dasharray="2 10"/>
  </g>

  <g fill="#7d8fc7" opacity=".5"><circle cx="120" cy="120" r="2.2"/><circle cx="540" cy="150" r="2"/><circle cx="60" cy="380" r="2"/></g>
  <g fill="#d8404a" opacity=".5"><circle cx="340" cy="110" r="1.8"/><circle cx="550" cy="390" r="2"/></g>
  <g fill="#f2b117" opacity=".5"><circle cx="440" cy="115" r="2.2"/></g>
</svg>
