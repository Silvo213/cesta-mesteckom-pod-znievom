<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <defs>
    <filter id="rgh" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="3" seed="91" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <filter id="wc" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="43" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
      <feGaussianBlur in="d" stdDeviation="1.4"/>
    </filter>
  </defs>

  <g filter="url(#wc)">
    <ellipse cx="300" cy="78" rx="260" ry="48" fill="#b9c2e2" opacity=".3"/>
    <ellipse cx="320" cy="195" rx="200" ry="30" fill="#d8404a" opacity=".38"/>
    <ellipse cx="320" cy="285" rx="200" ry="65" fill="#b9c2e2" opacity=".4"/>
    <ellipse cx="95" cy="270" rx="65" ry="90" fill="#7fae8e" opacity=".42"/>
    <ellipse cx="300" cy="330" rx="24" ry="30" fill="#7d8fc7" opacity=".4"/>
    <ellipse cx="300" cy="405" rx="260" ry="28" fill="#f2b117" opacity=".15"/>
  </g>

  <g filter="url(#rgh)" fill="none" stroke="#1d2f66" stroke-linecap="round" stroke-linejoin="round">
    <!-- baroková kúria -->
    <path d="M150 358 L150 232 L500 232 L500 358" stroke-width="3.6"/>
    <path d="M140 234 L172 196 L478 196 L510 234" stroke-width="3.4"/>
    <path d="M200 196 L200 232 M450 196 L450 232" stroke-width="2"/>
    <!-- klenutá brána -->
    <path d="M276 358 L276 296 Q 300 272 324 296 L324 358" stroke-width="3.2"/>
    <path d="M284 352 L284 302 Q 300 286 316 302 L316 352" stroke-width="2"/>
    <!-- okná so šambránami -->
    <path d="M176 262 h30 v34 h-30 Z M230 262 h30 v34 h-30 Z" stroke-width="2.2"/>
    <path d="M340 262 h30 v34 h-30 Z M394 262 h30 v34 h-30 Z M448 262 h30 v34 h-30 Z" stroke-width="2.2"/>
    <path d="M191 262 v34 M245 262 v34 M355 262 v34 M409 262 v34 M463 262 v34" stroke-width="1.3"/>
    <path d="M172 256 h38 M226 256 h38 M336 256 h38 M390 256 h38 M444 256 h38" stroke-width="1.6"/>
    <!-- tabuľa pri vchode -->
    <path d="M338 306 h26 v20 h-26 Z" stroke-width="1.8"/>
    <!-- lipa -->
    <path d="M92 362 L92 288 q-32 -34 -4 -56 q34 -20 34 16 q28 14 -4 40 q-14 10 -26 0" stroke-width="3"/>
    <path d="M70 250 q14 -12 30 -6 M104 236 q14 -8 24 2" stroke-width="1.8"/>
