    <path d="M296 218 L352 218 L352 262" stroke-width="3.2"/>
    <path d="M292 218 L326 196 L358 218" stroke-width="3.4"/>
    <path d="M274 196 L284 196 L284 214 L274 214 Z" stroke-width="2.2"/>
