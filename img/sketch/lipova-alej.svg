  <g fill="#f2b117" opacity=".55"><circle cx="300" cy="70" r="2.6"/><circle cx="180" cy="90" r="2"/><circle cx="430" cy="80" r="2.2"/></g>
  <g fill="#7fae8e" opacity=".6"><circle cx="240" cy="110" r="2.4"/><circle cx="510" cy="110" r="2"/></g>
  <g fill="#7d8fc7" opacity=".5"><circle cx="80" cy="330" r="2.2"/><circle cx="540" cy="330" r="2"/></g>
</svg>
