<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <defs>
    <filter id="rgh" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="3" seed="121" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <filter id="wc" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="59" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
      <feGaussianBlur in="d" stdDeviation="1.4"/>
    </filter>
  </defs>

  <g filter="url(#wc)">
    <ellipse cx="300" cy="60" rx="280" ry="45" fill="#b9c2e2" opacity=".35"/>
    <ellipse cx="140" cy="140" rx="150" ry="40" fill="#7d8fc7" opacity=".3"/>
    <ellipse cx="470" cy="130" rx="140" ry="38" fill="#7d8fc7" opacity=".28"/>
    <ellipse cx="300" cy="230" rx="180" ry="45" fill="#b9c2e2" opacity=".4"/>
    <ellipse cx="180" cy="280" rx="120" ry="40" fill="#7fae8e" opacity=".35"/>
    <ellipse cx="430" cy="290" rx="130" ry="40" fill="#f2b117" opacity=".22"/>
    <ellipse cx="300" cy="390" rx="280" ry="45" fill="#3a4b8f" opacity=".28"/>
    <ellipse cx="300" cy="222" rx="20" ry="14" fill="#d8404a" opacity=".5"/>
  </g>

  <g filter="url(#rgh)" fill="none" stroke="#1d2f66" stroke-linecap="round" stroke-linejoin="round">
    <!-- horizont hôr -->
    <path d="M30 130 Q 120 84 220 122 Q 300 92 390 118 Q 480 86 570 124" stroke-width="2.4"/>
    <!-- mestečko v údolí -->
    <path d="M292 232 L292 204 L302 194 L312 204 L312 232" stroke-width="2.4"/>
    <path d="M302 194 L302 184" stroke-width="2"/>
    <path d="M256 238 l14 -10 14 10 M330 236 l13 -9 13 9 M360 242 l12 -8 12 8" stroke-width="2"/>
    <path d="M240 248 h24 M328 246 h24 M358 252 h22 M270 252 h30" stroke-width="1.8"/>
    <path d="M226 258 Q 300 250 380 256" stroke-width="1.6" stroke-dasharray="2 8"/>
    <!-- polia — pačvork -->
    <path d="M120 290 L220 268 M160 306 L280 278 M330 280 L470 268 M360 300 L500 282" stroke-width="1.4"/>
    <!-- kalvária na kopčeku vpravo -->
    <path d="M480 232 Q 505 208 530 232" stroke-width="2.2"/>
    <path d="M502 212 L502 198 L512 198 L512 212 M501 198 L507 186 L513 198" stroke-width="1.8"/>
    <!-- konár v popredí -->
    <path d="M-10 330 Q 90 300 190 330 Q 130 322 60 336" stroke-width="3"/>
    <path d="M40 322 q10 -14 26 -16 M96 314 q12 -10 26 -8 M150 320 q10 -8 22 -4" stroke-width="2"/>
    <path d="M52 306 q6 -10 16 -12 M110 300 q8 -8 18 -6" stroke-width="1.6"/>
    <!-- turista s palicou na vyhliadke -->
    <path d="M492 372 q-2 -14 10 -14 q12 0 10 14 q8 4 6 12 l-32 0 q-2 -8 6 -12" stroke-width="2.4"/>
    <path d="M488 384 L484 416 M512 384 L516 416" stroke-width="2.4"/>
    <path d="M524 378 L530 416" stroke-width="2.2"/>
    <!-- skala vyhliadky -->
    <path d="M420 420 Q 500 398 580 416" stroke-width="2.8"/>
  </g>

  <g fill="#7d8fc7" opacity=".5"><circle cx="100" cy="90" r="2.2"/><circle cx="520" cy="80" r="2"/><circle cx="60" cy="380" r="2.2"/></g>
  <g fill="#f2b117" opacity=".5"><circle cx="410" cy="90" r="2.2"/><circle cx="560" cy="350" r="2"/></g>
  <g fill="#d8404a" opacity=".5"><circle cx="300" cy="160" r="1.8"/></g>
</svg>
