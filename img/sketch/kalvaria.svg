    <path d="M70 400 q4 -18 0 -28 M86 402 q4 -18 0 -28 M102 400 q4 -16 0 -26 M500 398 q4 -16 0 -26 M516 400 q4 -18 0 -28 M532 396 q4 -16 0 -24" stroke-width="1.8"/>
    <path d="M66 372 q8 -6 12 -14 M96 374 q8 -6 12 -14 M510 372 q8 -6 12 -14" stroke-width="1.4"/>
    <!-- zem -->
    <path d="M40 386 Q 200 376 320 380 Q 460 386 566 376" stroke-width="2.4"/>
  </g>

  <g fill="#f2b117" opacity=".5"><circle cx="120" cy="120" r="2.4"/><circle cx="500" cy="130" r="2"/></g>
  <g fill="#7d8fc7" opacity=".5"><circle cx="200" cy="100" r="2"/><circle cx="420" cy="90" r="2.2"/><circle cx="560" cy="340" r="2.2"/></g>
