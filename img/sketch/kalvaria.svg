<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <defs>
    <filter id="rgh" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="3" seed="131" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <filter id="wc" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="61" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
      <feGaussianBlur in="d" stdDeviation="1.4"/>
    </filter>
  </defs>

  <g filter="url(#wc)">
    <ellipse cx="300" cy="70" rx="270" ry="48" fill="#b9c2e2" opacity=".32"/>
    <ellipse cx="300" cy="270" rx="200" ry="110" fill="#7fae8e" opacity=".35"/>
    <ellipse cx="300" cy="220" rx="120" ry="70" fill="#b9c2e2" opacity=".3"/>
    <ellipse cx="300" cy="130" rx="46" ry="26" fill="#7d8fc7" opacity=".4"/>
    <ellipse cx="300" cy="405" rx="270" ry="32" fill="#f2b117" opacity=".28"/>
    <ellipse cx="90" cy="380" rx="70" ry="26" fill="#f2b117" opacity=".2"/>
  </g>

  <g filter="url(#rgh)" fill="none" stroke="#1d2f66" stroke-linecap="round" stroke-linejoin="round">
    <!-- kopec -->
    <path d="M60 372 Q 300 96 540 372" stroke-width="3"/>
