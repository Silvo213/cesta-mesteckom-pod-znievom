    <path d="M244 158 Q 292 170 340 158" stroke-width="2.6"/>
    <path d="M250 140 h10 v12 M330 140 h-10 v12" stroke-width="2"/>
    <!-- kaplnky na svahu -->
    <path d="M200 250 L200 232 Q 209 224 218 232 L218 250 Z" stroke-width="2.2"/>
    <path d="M262 300 L262 284 Q 270 277 278 284 L278 300 Z" stroke-width="2.2"/>
    <path d="M348 282 L348 266 Q 356 259 364 266 L364 282 Z" stroke-width="2.2"/>
    <path d="M410 322 L410 306 Q 418 299 426 306 L426 322 Z" stroke-width="2.2"/>
    <path d="M160 320 L160 305 Q 168 298 176 305 L176 320 Z" stroke-width="2.2"/>
    <!-- kľukatá cesta s procesiou -->
    <path d="M300 176 Q 240 220 280 260 Q 330 300 260 340 Q 210 366 160 372" stroke-width="2.2" stroke-dasharray="3 10"/>
    <path d="M283 254 l3 -8 M296 268 l3 -8 M270 330 l3 -8 M242 348 l3 -8 M220 358 l3 -8" stroke-width="2.4"/>
